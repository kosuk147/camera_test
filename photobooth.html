<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>フォトブース</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #f7f5f2; font-family: -apple-system, 'Helvetica Neue', sans-serif; }
#app { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 2rem; }
h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
.step { display: none; }
.step.active { display: block; }
.frame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
.frame-card { border: 2px solid #ddd; border-radius: 12px; padding: 8px; cursor: pointer; text-align: center; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; }
.frame-card:hover { border-color: #aaa; }
.frame-card.selected { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
.frame-card .preview { width: 100%; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; background: #eee; margin-bottom: 6px; }
.frame-card .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.frame-card p { font-size: 13px; color: #666; }
.frame-card.selected p { color: #185FA5; font-weight: 600; }
.section-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 2px; }
.text-fields { margin-bottom: 1.25rem; }
.text-fields input { width: 100%; margin-bottom: 8px; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; font-size: 14px; outline: none; transition: border-color 0.15s; }
.text-fields input:focus { border-color: #185FA5; }
.text-fields input::placeholder { color: #bbb; }
.btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd; background: #fff; color: #1a1a1a; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.12s, transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn:hover { background: #f0eeeb; }
.btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
.btn.primary:hover { background: #0C447C; }
.btn.danger { background: #fff; color: #A32D2D; border-color: #E24B4A; }
.btn.danger:hover { background: #fcebeb; }
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
#camera-wrap { position: relative; width: 100%; aspect-ratio: 1/1; background: #111; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
#frame-overlay { position: absolute; inset: 0; pointer-events: none; background-size: 100% 100%; background-repeat: no-repeat; }
.shutter-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
#shutter-btn { width: 68px; height: 68px; border-radius: 50%; background: #fff; border: 4px solid rgba(255,255,255,0.4); cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: transform 0.1s, background 0.1s; }
#shutter-btn:active { transform: scale(0.9); background: #ddd; }
#result-wrap { margin-bottom: 1rem; }
#result-canvas { width: 100%; display: block; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.hint { font-size: 12px; color: #999; text-align: center; margin-top: 10px; line-height: 1.6; }
.back-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; }
@media screen { #print-area { display: none; } }
@media print {
  html, body { background: white; }
  #app { display: none !important; }
  #print-area { display: block !important; width: 58mm; margin: 0; padding: 0; }
  #print-canvas { width: 58mm; display: block; }
}
</style>
</head>
<body>
<div id="app">
  <h1>📸 フォトブース</h1>

  <div id="step-frame" class="step active">
    <p class="section-label">フォトフレームを選んでね</p>
    <div class="frame-grid">
      <div class="frame-card selected" data-idx="0">
        <div class="preview"><img id="thumb0" src="" alt="フレーム1"></div>
        <p>ハートフレーム</p>
      </div>
      <div class="frame-card" data-idx="1">
        <div class="preview"><img id="thumb1" src="" alt="フレーム2"></div>
        <p>カラフルフレーム</p>
      </div>
    </div>
    <p class="section-label">テキスト設定（任意）</p>
    <div class="text-fields">
      <input type="text" id="event-name" placeholder="イベント名（例：〇〇ファンミーティング）">
      <input type="text" id="event-date" placeholder="日付（例：2025.08.10）">
    </div>
    <button class="btn primary" id="go-camera">カメラを起動する</button>
  </div>

  <div id="step-camera" class="step">
    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="frame-overlay"></div>
    </div>
    <div class="shutter-wrap">
      <button id="shutter-btn" title="撮影"></button>
    </div>
    <span class="back-link" id="back-to-frame">← フレーム選択に戻る</span>
    <canvas id="hidden-canvas" style="display:none"></canvas>
  </div>

  <div id="step-result" class="step">
    <div id="result-wrap">
      <canvas id="result-canvas"></canvas>
    </div>
    <div class="action-row" style="margin-top:12px">
      <button class="btn danger" id="retake-btn">撮り直す</button>
      <button class="btn primary" id="print-btn">印刷する</button>
    </div>
    <p class="hint">印刷ダイアログで「用紙サイズ：58mm幅」・余白「なし」を選択してください</p>
  </div>
</div>

<div id="print-area"><canvas id="print-canvas"></canvas></div>

const FRAME_NAMES = ['ハートフレーム', 'カラフルフレーム'];

const frameImgs = [new Image(), new Image()];
let selectedFrame = 0;
let capturedDataUrl = null;
let stream = null;

frameImgs.forEach((img, i) => {
  img.src = FRAMES[i];
  img.onload = () => { document.getElementById('thumb' + i).src = FRAMES[i]; };
});

document.querySelectorAll('.frame-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.frame-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedFrame = parseInt(card.dataset.idx);
  });
});

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    const ov = document.getElementById('frame-overlay');
    ov.style.backgroundImage = 'url(' + FRAMES[selectedFrame] + ')';
  } catch(e) {
    alert('カメラへのアクセスが許可されていません。\nブラウザのカメラ許可設定を確認してください。');
    showStep('step-frame');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

document.getElementById('go-camera').addEventListener('click', () => {
  showStep('step-camera'); startCamera();
});
document.getElementById('back-to-frame').addEventListener('click', () => {
  stopCamera(); showStep('step-frame');
});

document.getElementById('shutter-btn').addEventListener('click', () => {
  const video = document.getElementById('video');
  const hc = document.getElementById('hidden-canvas');
  hc.width = W; hc.height = H;
  const ctx = hc.getContext('2d');
  ctx.save();
  ctx.translate(W, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, W, H);
  ctx.restore();
  ctx.drawImage(frameImgs[selectedFrame], 0, 0, W, H);

  const name = document.getElementById('event-name').value.trim();
  const date = document.getElementById('event-date').value.trim();
  if (name || date) {
    const barH = (name && date) ? 56 : 36;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H - barH, W, barH);
    ctx.fillStyle = 'white'; ctx.textAlign = 'center';
    if (name && date) {
      ctx.font = 'bold 22px sans-serif'; ctx.fillText(name, W / 2, H - barH + 26);
      ctx.font = '18px sans-serif'; ctx.fillText(date, W / 2, H - barH + 48);
    } else {
      ctx.font = 'bold 22px sans-serif'; ctx.fillText(name || date, W / 2, H - barH + 24);
    }
  }

  capturedDataUrl = hc.toDataURL('image/jpeg', 0.92);
  const rc = document.getElementById('result-canvas');
  rc.width = W; rc.height = H;
  rc.getContext('2d').drawImage(hc, 0, 0);
  stopCamera();
  showStep('step-result');
});

document.getElementById('retake-btn').addEventListener('click', () => {
  showStep('step-camera'); startCamera();
});

document.getElementById('print-btn').addEventListener('click', () => {
  const pc = document.getElementById('print-canvas');
  pc.width = W; pc.height = H;
  const img = new Image();
  img.onload = () => { pc.getContext('2d').drawImage(img, 0, 0); window.print(); };
  img.src = capturedDataUrl;
});

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</html>
